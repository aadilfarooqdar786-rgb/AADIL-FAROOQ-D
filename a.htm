<!DOCTYPE html>
<html>
<head>
<title>Mastermind Institute of Education Bijbehara Anantnag</title>

<style>
body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
margin:0;
padding:0;
color:white;
}

marquee{
font-size:35px;
font-weight:bold;
padding:15px;
background:#000;
color:#00ffff;
text-shadow:0 0 15px cyan;
}

.container{
width:90%;
max-width:700px;
margin:30px auto;
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:15px;
backdrop-filter:blur(10px);
}

h2{
text-align:center;
color:#00ffff;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
font-weight:bold;
}

.save{
background:#00ff88;
}

.clear{
background:red;
color:white;
}

.view{
background:#00bfff;
}

.share{
background:#25D366;
color:white;
}

.call{
background:orange;
}

img{
width:120px;
height:120px;
border-radius:50%;
display:block;
margin:auto;
object-fit:cover;
border:3px solid white;
}
</style>
</head>

<body>

<marquee>
MASTERMIND INSTITUTE OF EDUCATION BIJBEHARA ANANTNAG
</marquee>

<div class="container">

<h2>Student Registration Form</h2>

<img id="preview" src="" alt="Photo">

<input type="file" id="photo" accept="image/*">

<input type="text" id="name" placeholder="Student Name">
<input type="text" id="parentage" placeholder="Parentage">
<input type="text" id="residence" placeholder="Residence">
<input type="email" id="email" placeholder="Email">
<input type="text" id="phone" placeholder="Phone Number">

<button class="save" onclick="saveData()">Save Student</button>
<button class="clear" onclick="clearFields()">Clear</button>

<a href="records.html">
<button class="view">View Records</button>
</a>

<a href="https://wa.me/918082586179">
<button class="share">WhatsApp</button>
</a>

<a href="tel:8082586179">
<button class="call">Call</button>
</a>

</div>

<script>

let photoData="";

document.getElementById("photo").addEventListener("change",function(){
let reader=new FileReader();

reader.onload=function(){
photoData=reader.result;
document.getElementById("preview").src=photoData;
}
reader.readAsDataURL(this.files[0]);
});

function saveData(){

let students=JSON.parse(localStorage.getItem("students"))||[];

students.push({
photo:photoData,
name:name.value,
parentage:parentage.value,
residence:residence.value,
email:email.value,
phone:phone.value
});

localStorage.setItem("students",JSON.stringify(students));

alert("Student Saved");

clearFields();
}

function clearFields(){
name.value="";
parentage.value="";
residence.value="";
email.value="";
phone.value="";
preview.src="";
}

</script>

</body>
</html>
